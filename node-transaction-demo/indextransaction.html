<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Node Transaction Demo</title>
  <link rel="stylesheet" href="./styletransaction.css" />
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand-mark">SI</div>
      <nav aria-label="Stock Inventory nodes">
        <a href="../node-location-demo/" aria-label="Node Location">Node Location</a>
        <a href="./" class="is-active" aria-label="Stock Action">Stock Action</a>
      </nav>
    </aside>

    <section class="workspace">
      <section class="action-panel">
        <div class="scan-row">
          <label>
            <span>Item Code / Scan Barcode</span>
            <select id="itemCode"></select>
          </label>
          <button type="button" class="toggle-button">เต็มจอ</button>
        </div>

        <label class="field-block">
          <span>Description (รายละเอียดสินค้า)</span>
          <div id="itemDescription" class="readonly-field"></div>
        </label>

        <div class="weight-grid">
          <label class="field-block">
            <span>น้ำหนักต่อชิ้น (Unit Weight)</span>
            <div class="input-with-unit">
              <input id="unitWeightG" type="number" readonly />
              <b>g./Pcs</b>
            </div>
          </label>
          <label class="field-block">
            <span>น้ำหนักรวม (Total Weight)</span>
            <div class="input-with-unit">
              <input id="totalWeightG" type="number" min="0" step="0.001" value="800" />
              <b>/g.</b>
            </div>
          </label>
        </div>

        <div class="lower-grid">
          <section class="calc-card">
            <div>
              <strong>จำนวนชิ้นที่คำนวณได้</strong>
              <span>( Total Weight ÷ Unit Weight )</span>
            </div>
            <input id="calculatedPcs" type="number" readonly />
            <b>ชิ้น (Pcs)</b>
          </section>

          <section class="location-card">
            <label>
              <span>Location Cod / รหัสตำแหน่ง</span>
              <select id="locationCode"></select>
            </label>
            <div class="location-breakdown">
              <span>Row :</span><strong id="locationRow"></strong>
              <span>Shelf :</span><strong id="locationShelf"></strong>
              <span>Level :</span><strong id="locationLevel"></strong>
              <span>Box :</span><strong id="locationBox"></strong>
            </div>
          </section>
        </div>

        <div class="reference-row">
          <label>
            <span>Reference No</span>
            <input id="referenceNo" type="text" placeholder="Optional document no." />
          </label>
          <label>
            <span>Remark</span>
            <input id="remark" type="text" placeholder="Optional note" />
          </label>
        </div>

        <div id="message" class="message" aria-live="polite"></div>

        <div class="action-buttons">
          <button id="inButton" class="action in" type="button">IN / รับเข้า</button>
          <button id="outButton" class="action out" type="button">OUT / นำออก</button>
        </div>
      </section>

      <aside class="viewer-panel">
        <section class="onhand-card">
          <button type="button" class="toggle-button">เต็มจอ</button>
          <div>
            <span>Onhands :</span>
            <strong id="onHandPcs">0</strong>
            <b>Pcs.</b>
            <small id="onHandKg">0 kg</small>
          </div>
        </section>

        <section class="month-card">
          <h2>Accum Action In <span id="monthName"></span></h2>
          <div class="month-grid">
            <span>IN :</span><strong id="monthlyIn">0</strong>
            <span>OUT :</span><strong id="monthlyOut">0</strong>
          </div>
        </section>

        <section class="history-panel">
          <h2>Item Location Balance</h2>
          <div id="balanceList" class="balance-list"></div>
        </section>
      </aside>
    </section>
  </main>

  <div id="confirmModal" class="modal" aria-hidden="true">
    <section id="confirmCard" class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <header>
        <div>
          <span>Confirm Transaction</span>
          <h2 id="confirmTitle">IN / รับเข้า</h2>
        </div>
      </header>
      <div id="confirmBody" class="confirm-body"></div>
      <footer>
        <button id="cancelConfirm" type="button" class="cancel">Cancel</button>
        <button id="confirmPost" type="button" class="confirm">Confirm</button>
      </footer>
    </section>
  </div>

  <script src="./mock-dbtransaction.js"></script>
  <script src="./apptransaction.js"></script>
  <script>
    document.getElementById("monthName").textContent = new Date().toLocaleString("en-US", { month: "short" });
  </script>
</body>
</html>
