<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202020">Location / QR Code Format</text>

  <text x="80" y="118" font-family="Arial, sans-serif" font-size="28" fill="#202020">Old Example: ZONE=A | ROW=01 | SHELF=03 | LEVEL=2 | BOX=001</text>
  <text x="80" y="165" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#e53935">Real Project Format: AB001-101</text>

  <text x="600" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="8" fill="#111111">XXXXX-XXX</text>

  <g stroke-width="6" stroke-linecap="round">
    <line x1="318" y1="314" x2="356" y2="314" stroke="#2ecc71"/>
    <line x1="367" y1="314" x2="440" y2="314" stroke="#6c5ce7"/>
    <line x1="452" y1="314" x2="526" y2="314" stroke="#f4b400"/>
    <line x1="635" y1="314" x2="672" y2="314" stroke="#00acc1"/>
    <line x1="683" y1="314" x2="759" y2="314" stroke="#e53935"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="22" fill="#222222">
    <text x="310" y="380">Zone</text>
    <text x="372" y="420">RowCode</text>
    <text x="458" y="380">ShelfCode</text>
    <text x="620" y="380">Level</text>
    <text x="704" y="420">BoxCode</text>
  </g>

  <g stroke="#333333" stroke-width="2" fill="none">
    <rect x="140" y="470" width="920" height="160"/>
    <line x1="140" y1="510" x2="1060" y2="510"/>
    <line x1="140" y1="550" x2="1060" y2="550"/>
    <line x1="140" y1="590" x2="1060" y2="590"/>
    <line x1="420" y1="470" x2="420" y2="630"/>
    <line x1="760" y1="470" x2="760" y2="630"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="20" fill="#111111">
    <text x="280" y="497" text-anchor="middle" font-weight="700">Part</text>
    <text x="590" y="497" text-anchor="middle" font-weight="700">Rule</text>
    <text x="910" y="497" text-anchor="middle" font-weight="700">Example</text>

    <text x="280" y="537" text-anchor="middle">Zone</text>
    <text x="590" y="537" text-anchor="middle">1 character letter or number</text>
    <text x="910" y="537" text-anchor="middle">A</text>

    <text x="280" y="577" text-anchor="middle">RowCode + ShelfCode</text>
    <text x="590" y="577" text-anchor="middle">Row B becomes B0, Shelf 1 becomes 01</text>
    <text x="910" y="577" text-anchor="middle">B001</text>

    <text x="280" y="617" text-anchor="middle">Level + BoxCode</text>
    <text x="590" y="617" text-anchor="middle">Level 1, Box 1 becomes 01</text>
    <text x="910" y="617" text-anchor="middle">101</text>
  </g>

  <text x="600" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#555555">Final code = Zone + RowCode + ShelfCode + "-" + Level + BoxCode</text>
</svg>
